<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roop Rang Style</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#fffafc;
color:#222;
}

.hero{
padding:40px 20px;
text-align:center;
background:linear-gradient(#ffe8f0,#ffffff);
}

.hero h1{
font-size:40px;
color:#d63384;
margin-bottom:10px;
}

.hero p{
font-size:18px;
color:#666;
}

.btn{
display:inline-block;
margin-top:20px;
padding:15px 35px;
background:#d63384;
color:white;
text-decoration:none;
border-radius:50px;
font-weight:bold;
}

.section{
padding:30px 20px;
}

.card{
background:white;
border-radius:20px;
padding:20px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
text-align:center;
}

.card img{
width:100%;
border-radius:15px;
}

.price{
font-size:22px;
font-weight:bold;
color:#d63384;
}
</style>

</head>

<body>

<div class="hero">

<h1>Roop Rang Style</h1>

<p>Luxury Fashion Collection</p>

<a href="#" class="btn">Shop Now</a>

</div>

<div class="section">

<div class="card">

<h2>Featured Product</h2>

<p class="price">₹999</p>

<a href="#" class="btn">Buy Now</a>

</div>

</div>

</body>

</html>
